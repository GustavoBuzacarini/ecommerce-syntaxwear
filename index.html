<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyntaxWear - Ecommerce de Tênis</title>
    <link rel="stylesheet" href="css/components/variables.css" />
    <link rel="stylesheet" href="css/base/reset.css" />
    <link rel="stylesheet" href="css/layout/header.css" />
    <link rel="stylesheet" href="css/pages/home.css" />
  </head>
  <body>
    <header class="main-header">
      <h1 class="logo">
        <a href="#" title="SyntaxWear - Sneakers Online">
          <img src="./assets/images/logo/logo.svg" alt="Logo SyntaxWear" />
        </a>
      </h1>

      <nav class="nav-center">
        <ul role="list">
          <li><a href="#">Masculino</a></li>
          <li><a href="#">Feminino</a></li>
          <li><a href="#">Outlet</a></li>
        </ul>
      </nav>

      <nav class="nav-right">
        <ul role="list">
          <li><a href="#">Nossas lojas</a></li>
          <li><a href="#">Sobre</a></li>
          <li>
            <a href="#" aria-label="Perfil">
              <img
                src="assets/icons/perfil.svg"
                alt="Ícone de Perfil"
              />
            </a>
          </li>
          <li>
            <a href="#" aria-label="Ajuda">
              <img
                src="assets/icons/ajuda.svg"
                alt="Ícone de Ajuda"
              />
            </a>
          </li>
          <li>
            <a href="#" aria-label="Carrinho">
              <img
                src="assets/icons/carrinho.svg"
                alt="Ícone de Carrinho"
              />
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <!-- Seção Hero -->
      </section>

      <section class="categories">
        <!-- Seção de Categorias de Tênis -->
      </section>

      <section class="featured-products">
        <!-- Grid com Produtos em Destaque -->
      </section>
    </main>

    <footer class="main-footer">
      <!-- Informações de Contato e Links -->
    </footer>

    <script src="js/pages/home.js"></script>
  </body>
</html>
